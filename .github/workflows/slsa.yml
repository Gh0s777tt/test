name: SLSA Provenance Build

on:
  push:
    branches: [ 0.4.1 ]
  pull_request:

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Generate provenance
        uses: sigstore/slsa-provenance-action@v1
        with:
          artifact_path: target/release