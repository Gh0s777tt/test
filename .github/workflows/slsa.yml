name: SLSA Provenance Build

on:
  push:
    branches: [ 0.4.1 ]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Generate provenance
        uses: sigstore/slsa-provenance-action@v2.1.0
        with:
          artifact_path: target/release/vantis
          if: hashFiles('target/release/vantis') != ''