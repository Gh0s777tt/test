name: ISO Release Assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_assets:
        description: "Create ISO release assets"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  checks: write

jobs:
  create-assets:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_assets }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            genisoimage \
            libfuse3-dev \
            nasm \
            qemu-system-x86 \
            qemu-utils \
            syslinux-utils \
            xorriso

      - name: Install Rust toolchain
        run: rustup toolchain install nightly-2025-10-03 --component rust-src --profile minimal

      - name: Create placeholder assets
        run: |
          echo "Creating placeholder ISO assets"
          echo "ISO creation would happen here with full build environment"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: |
            README.md
            CHANGELOG.md