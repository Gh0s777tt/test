name: Vantis CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  security-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  cortex-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortex
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  cytadela-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cytadela
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  horizon-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: horizon
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  store-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: store
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  traceability-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run traceability consistency check
        run: ./scripts/check_traceability.sh

  requirement-id-gate:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce requirement IDs for critical changes
        run: ./scripts/check_requirement_ids.sh

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check Markdown links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >
            --offline
            --no-progress
            README.md
            docs/README.md
            docs/README_AR.md
            docs/README_JA.md
            docs/README_RU.md
            docs/README_ZH.md
            docs/security/BUG_BOUNTY.md
            docs/translations/README_AR.md
            docs/translations/README_DE.md
            docs/translations/README_ES.md
            docs/translations/README_FR.md
            docs/translations/README_JA.md
            docs/translations/README_PL.md
            docs/translations/README_RU.md
            docs/translations/README_ZH.md
            CONTRIBUTING.md
            docs/ARCHITECTURE.md
            docs/DEVELOPER_ONBOARDING.md
            docs/development/DEVELOPER_ONBOARDING.md
            docs/development/PROGRESS_REPORT.md
            docs/development/VERIFICATION_SETUP_COMPLETE.md

  benchmark-reproducibility-gate:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run strict reproducibility check (path lookup cache)
        run: >
          ./scripts/benchmark_reproducibility.sh
          --bench path_lookup_cache_benchmark
          --runs 2
          --spread-threshold-pct 10
          --strict
          --baseline-prefix ci_repro

      - name: Upload reproducibility report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reproducibility-report
          path: analysis/benchmark_reproducibility/path_lookup_cache_benchmark_*.md
          if-no-files-found: warn
