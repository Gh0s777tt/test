name: Vantis CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test (build-only)
        run: cargo test --locked --no-run

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check Markdown links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >
            --offline
            --no-progress
            README.md
            docs/README.md
            docs/README_AR.md
            docs/README_JA.md
            docs/README_RU.md
            docs/README_ZH.md
            docs/security/BUG_BOUNTY.md
            docs/translations/README_AR.md
            docs/translations/README_DE.md
            docs/translations/README_ES.md
            docs/translations/README_FR.md
            docs/translations/README_JA.md
            docs/translations/README_PL.md
            docs/translations/README_RU.md
            docs/translations/README_ZH.md
