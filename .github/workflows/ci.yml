name: Vantis CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  security-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  cortex-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortex
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  cytadela-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cytadela
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  horizon-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: horizon
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  store-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: store
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

      - name: Clippy (warnings are errors)
        run: cargo clippy --locked -- -D warnings

  traceability-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run traceability consistency check
        run: ./scripts/check_traceability.sh

  requirement-id-gate:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce requirement IDs for critical changes
        run: ./scripts/check_requirement_ids.sh

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check Markdown links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >
            --offline
            --no-progress
            README.md
            docs/README.md
            docs/README_AR.md
            docs/README_JA.md
            docs/README_RU.md
            docs/README_ZH.md
            docs/security/BUG_BOUNTY.md
            docs/translations/README_AR.md
            docs/translations/README_DE.md
            docs/translations/README_ES.md
            docs/translations/README_FR.md
            docs/translations/README_JA.md
            docs/translations/README_PL.md
            docs/translations/README_RU.md
            docs/translations/README_ZH.md
            CONTRIBUTING.md
            docs/ARCHITECTURE.md
            docs/DEVELOPER_ONBOARDING.md
            docs/development/DEVELOPER_ONBOARDING.md
            docs/development/PROGRESS_REPORT.md
            docs/development/VERIFICATION_SETUP_COMPLETE.md

  benchmark-reproducibility-gate:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Enforce monitor threshold governance
        run: ./scripts/check_monitor_threshold_governance.sh

      - name: Validate MONPOL signoff metadata
        run: ./scripts/validate_monpol_signoff_metadata.sh

      - name: Run benchmark reproducibility gate (strict + monitor)
        run: >
          ./scripts/run_benchmark_ci_gate.sh
          --runs 2
          --strict-bench path_lookup_cache_benchmark
          --strict-threshold-pct 50
          --monitor-bench timer_queue_benchmark:60
          --monitor-bench directory_entry_cache_benchmark:25
          --monitor-threshold-pct 25
          --monitor-budget-seconds 240
          --monitor-case-timeout-seconds 150
          --baseline-prefix ci_repro

      - name: Generate rolling monitor policy recommendations
        if: ${{ always() }}
        run: >
          ./scripts/recommend_monitor_policy.sh
          --bench timer_queue_benchmark
          --bench directory_entry_cache_benchmark
          --lookback 6
          --min-samples 2
          --headroom-pct 15
          --floor-pct 5
          --ceil-pct 80

      - name: Build monitor policy drift dashboard
        if: ${{ always() }}
        run: >
          ./scripts/build_monitor_policy_dashboard.sh
          --lookback-runs 10
          --lookback-recommendations 6

      - name: Evaluate monitor drift escalation policy
        if: ${{ always() }}
        run: >
          ./scripts/evaluate_monitor_drift_escalation.sh
          --window-runs 5
          --watch-drift-rate-pct 20
          --escalate-consecutive-drift 2
          --critical-consecutive-drift 3
          --escalate-drift-rate-pct 40
          --critical-drift-rate-pct 60
          --escalate-failure-rate-pct 10
          --critical-failure-rate-pct 20

      - name: Generate threshold governance proposal draft
        if: ${{ always() }}
        run: >
          ./scripts/generate_monitor_threshold_proposal.sh
          --bench timer_queue_benchmark
          --bench directory_entry_cache_benchmark

      - name: Generate MONPOL changelog scaffold draft
        if: ${{ always() }}
        run: >
          ./scripts/scaffold_monpol_changelog_entry.sh

      - name: Generate monitor drift release handoff checklist
        if: ${{ always() }}
        run: >
          ./scripts/generate_monitor_drift_release_handoff.sh
          --strict

      - name: Run release-readiness strict drill dry-run
        if: ${{ always() }}
        run: >
          ./scripts/run_monitor_drift_release_readiness_drill.sh

      - name: Route escalation breach evidence
        if: ${{ always() }}
        run: >
          ./scripts/route_monitor_drift_breach_evidence.sh

      - name: Evaluate governance gate promotion readiness
        if: ${{ always() }}
        run: >
          ./scripts/evaluate_governance_gate_promotion_readiness.sh

      - name: Generate enforced pilot execution runbook
        if: ${{ always() }}
        run: >
          ./scripts/generate_enforced_pilot_runbook.sh

      - name: Evaluate enforced pilot burn-in telemetry SLO
        if: ${{ always() }}
        run: >
          ./scripts/evaluate_enforced_pilot_burn_in_slo.sh

      - name: Scaffold enforced pilot rollback postmortem
        if: ${{ always() }}
        run: >
          ./scripts/scaffold_enforced_pilot_rollback_postmortem.sh

      - name: Generate enforced pilot incident closure handoff signoff packet
        if: ${{ always() }}
        run: >
          ./scripts/generate_enforced_pilot_handoff_signoff_packet.sh

      - name: Generate enforced pilot closure audit and rollout summary
        if: ${{ always() }}
        run: >
          ./scripts/generate_enforced_pilot_closure_audit.sh

      - name: Enforce monitor threshold governance (promotion-aware)
        if: ${{ always() }}
        run: >
          ./scripts/check_monitor_threshold_governance.sh

      - name: Generate governance transition pack
        if: ${{ always() }}
        run: >
          ./scripts/generate_governance_transition_pack.sh

      - name: Upload reproducibility report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reproducibility-report
          path: |
            analysis/benchmark_reproducibility/*.md
            analysis/benchmark_reproducibility/*.json
          if-no-files-found: warn
