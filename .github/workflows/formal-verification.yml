name: Formal Verification

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Verus
        run: |
          git clone https://github.com/verus-lang/verus
          cd verus && ./install.sh

      - name: Run Formal Proofs
        run: |
          verus kernel/verified/*.rs
