name: Formal Verification

on:
  push:
    branches: [ 0.4.1, main, master ]
  pull_request:
    branches: [ 0.4.1, main, master ]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  verus-verification:
    name: Verus Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          override: true
          components: rustfmt, clippy
      
      - name: Cache Verus
        id: cache-verus
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/verus
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-verus-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Verus
        if: steps.cache-verus.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/verus-lang/verus.git /tmp/verus
          cd /tmp/verus
          ./tools/get-z3.sh
          cargo build --release
          cp target/release/verus ~/.cargo/bin/
          chmod +x ~/.cargo/bin/verus
      
      - name: Verify Verus installation
        run: verus --version
      
      - name: Run Verus verification
        run: |
          if ls formal/specs/*.rs >/dev/null 2>&1; then
            for spec_file in formal/specs/*.rs; do
              echo "Verifying ${spec_file}"
              verus "$spec_file"
            done
          else
            echo "No formal/specs/*.rs files found."
            exit 1
          fi

  kani-verification:
    name: Kani Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          override: true
      
      - name: Cache Kani
        id: cache-kani
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-kani-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Kani
        if: steps.cache-kani.outputs.cache-hit != 'true'
        run: |
          cargo install --locked kani-verifier
          cargo kani setup
      
      - name: Verify Kani installation
        run: |
          cargo kani --version
      
      - name: Run Kani verification
        run: |
          if grep -r "#\[kani::proof\]" src/verified; then
            cargo kani --manifest-path src/verified/Cargo.toml --harness verify_allocate_free_roundtrip
          else
            echo "No Kani proofs found yet"
            exit 1
          fi

  verification-report:
    name: Generate Verification Report
    runs-on: ubuntu-latest
    needs: [verus-verification, kani-verification]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate report
        run: |
          echo "# Formal Verification Report" > verification-report.md
          echo "" >> verification-report.md
          echo "**Date**: $(date)" >> verification-report.md
          echo "**Commit**: ${{ github.sha }}" >> verification-report.md
          echo "" >> verification-report.md
          echo "## Verification Status" >> verification-report.md
          echo "" >> verification-report.md
          echo "- Verus: ${{ needs.verus-verification.result }}" >> verification-report.md
          echo "- Kani: ${{ needs.kani-verification.result }}" >> verification-report.md
          echo "" >> verification-report.md
          echo "## Next Steps" >> verification-report.md
          echo "" >> verification-report.md
          echo "1. Review verification results" >> verification-report.md
          echo "2. Fix any failing proofs" >> verification-report.md
          echo "3. Add more verified code" >> verification-report.md
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-report.md