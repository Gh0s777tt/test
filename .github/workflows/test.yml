name: Test Suite

on:
  push:
    branches:
      - 0.4.1
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run workspace tests
        run: cargo test --workspace --all-features

  test-scripts:
    name: Script Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: |
          set -e
          find . -name "*.sh" -not -path "./target/*" | while read -r script; do
            echo "Validating: $script"
            bash -n "$script"
          done

  test-health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run health check
        run: |
          set -e
          if [ -f scripts/health_check.sh ]; then
            chmod +x scripts/health_check.sh
            bash scripts/health_check.sh
          else
            echo "No health_check.sh found, skipping"
          fi

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-rust, test-scripts, test-health-check]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-rust.result }}" != "success" ]; then
            echo "❌ Rust tests failed"
            exit 1
          fi
          if [ "${{ needs.test-scripts.result }}" != "success" ]; then
            echo "❌ Script validation failed"
            exit 1
          fi
          echo "✅ All tests passed"