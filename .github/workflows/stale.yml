name: 🧹 Janitor Protocol

on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: '📡 **SIGNAL LOST:** This issue has been inactive for 60 days. Closing in 7 days.'
          stale-pr-message: '❄️ **FROZEN:** This PR is stale.'
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: '💀 stale'
