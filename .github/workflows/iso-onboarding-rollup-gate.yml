name: ISO Onboarding Rollup Gate

on:
  push:
    branches:
      - main
      - master
      - 0.4.1
    paths:
      - ".github/workflows/iso-onboarding-rollup-gate.yml"
      - "governance/performance/ISO_ONBOARDING_ROLLUP_GATE_POLICY.json"
      - "scripts/build_iso.sh"
      - "scripts/run_iso_onboarding_ci_gate.sh"
      - "scripts/generate_iso_onboarding_telemetry_rollup.sh"
      - "scripts/install_iso_build_deps_ubuntu.sh"
      - "scripts/validate_iso_onboarding_rollup_gate_policy.sh"
      - "userspace/init.rs"
      - "userspace/shell.rs"
  pull_request:
    paths:
      - ".github/workflows/iso-onboarding-rollup-gate.yml"
      - "governance/performance/ISO_ONBOARDING_ROLLUP_GATE_POLICY.json"
      - "scripts/build_iso.sh"
      - "scripts/run_iso_onboarding_ci_gate.sh"
      - "scripts/generate_iso_onboarding_telemetry_rollup.sh"
      - "scripts/install_iso_build_deps_ubuntu.sh"
      - "scripts/validate_iso_onboarding_rollup_gate_policy.sh"
      - "userspace/init.rs"
      - "userspace/shell.rs"
  workflow_dispatch:
    inputs:
      policy_profile:
        description: "Policy profile from governance/performance/ISO_ONBOARDING_ROLLUP_GATE_POLICY.json"
        required: false
        default: ci_default
        type: choice
        options:
          - ci_default
          - local_fast

permissions:
  contents: read

concurrency:
  group: iso-onboarding-rollup-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iso-onboarding-rollup-gate:
    name: ISO onboarding rollup threshold gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ISO_POLICY_PROFILE: ${{ github.event.inputs.policy_profile || 'ci_default' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate onboarding gate policy
        run: >
          ./scripts/validate_iso_onboarding_rollup_gate_policy.sh
          --validate-workflow-options
          --require-profile ci_default
          --require-profile local_fast

      - name: Install host dependencies
        run: ./scripts/install_iso_build_deps_ubuntu.sh --with-qemu

      - name: Build ISO and enforce onboarding rollup thresholds
        run: >
          ./scripts/run_iso_onboarding_ci_gate.sh
          --output build/VantisOS-live.iso
          --policy-profile "${ISO_POLICY_PROFILE}"

      - name: Publish gate summary
        if: ${{ always() }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          analysis_dir = Path("analysis/benchmark_reproducibility")
          latest_rollup = analysis_dir / "iso_onboarding_telemetry_rollup_latest.json"
          iso_path = Path("build/VantisOS-live.iso")

          policy_profile = os.environ.get("ISO_POLICY_PROFILE", "unknown")
          lines = [
              "## ISO onboarding rollup threshold gate",
              "",
              f"- policy_profile: `{policy_profile}`",
              "",
          ]
          if latest_rollup.exists():
              payload = json.loads(latest_rollup.read_text(encoding="utf-8"))
              evaluation = payload.get("threshold_evaluation", {})
              policy = payload.get("threshold_policy", {})
              aggregate = payload.get("aggregate", {})
              lines.extend(
                  [
                      f"- threshold_status: `{evaluation.get('status', 'unknown')}`",
                      f"- breaches_count: `{len(evaluation.get('breaches', []))}`",
                      f"- window_effective: `{payload.get('window_size_effective', 0)}`",
                      f"- lockout_run_ratio: `{aggregate.get('lockout_run_ratio', 0.0)}`",
                      f"- max_failures_mean: `{aggregate.get('max_failures_mean', 0.0)}`",
                      f"- require_final_source: `{policy.get('require_final_source')}`",
                      "",
                  ]
              )
              breaches = evaluation.get("breaches", [])
              if breaches:
                  lines.append("### Breaches")
                  lines.append("")
                  lines.extend([f"- {entry}" for entry in breaches])
                  lines.append("")
          else:
              lines.extend(
                  [
                      "- latest rollup artifact not found",
                      "",
                  ]
              )

          if iso_path.exists():
              sha = hashlib.sha256(iso_path.read_bytes()).hexdigest()
              lines.extend(
                  [
                      "### ISO artifact",
                      "",
                      f"- path: `{iso_path}`",
                      f"- size_bytes: `{iso_path.stat().st_size}`",
                      f"- sha256: `{sha}`",
                      "",
                  ]
              )

          summary.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Upload ISO onboarding artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: iso-onboarding-rollup-gate-artifacts-${{ env.ISO_POLICY_PROFILE }}
          path: |
            analysis/benchmark_reproducibility/*.log
            analysis/benchmark_reproducibility/iso_onboarding_telemetry_summary_*.json
            analysis/benchmark_reproducibility/iso_onboarding_telemetry_summary_*.md
            analysis/benchmark_reproducibility/iso_onboarding_telemetry_rollup_*.json
            analysis/benchmark_reproducibility/iso_onboarding_telemetry_rollup_*.md
            build/VantisOS-live.iso
          if-no-files-found: warn
          retention-days: 14
