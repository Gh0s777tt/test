name: 🧬 Mutation Testing (Gene Splicing)

on:
  push:
    branches: [ 0.4.1, master, main ]
  pull_request:

jobs:
  mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-mutants
        run: cargo install cargo-mutants
      
      - name: Hunt Mutants
        run: cargo mutants --manifest-path src/verified/Cargo.toml --timeout 300 -- --all-features
