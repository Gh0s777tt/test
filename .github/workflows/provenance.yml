name: Generate Provenance

on:
  workflow_run:
    workflows: ["Secure Build"]
    types:
      - completed

jobs:
  provenance:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout source at verified commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create source archive and digest
        run: |
          tar -czf source.tar.gz --exclude=".git" .
          sha256sum source.tar.gz | awk '{print $1}' > source.tar.gz.sha256
          echo "ARTIFACT_SHA256=$(cat source.tar.gz.sha256)" >> "$GITHUB_ENV"

      - name: Generate provenance JSON
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os

          provenance = {
              "schema": "https://slsa.dev/provenance/v1",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "commit_sha": os.environ["HEAD_SHA"],
              "ref": os.environ.get("HEAD_BRANCH", ""),
              "triggering_workflow": os.environ["WORKFLOW_NAME"],
              "workflow_run_id": int(os.environ["WORKFLOW_RUN_ID"]),
              "artifact": {
                  "name": "source.tar.gz",
                  "sha256": os.environ["ARTIFACT_SHA256"],
              },
              "builder": {
                  "platform": "github-actions",
                  "workflow": os.environ["GITHUB_WORKFLOW"],
                  "runner_os": os.environ["RUNNER_OS"],
              },
              "generated_at_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
          }

          with open("provenance.json", "w", encoding="utf-8") as fh:
              json.dump(provenance, fh, indent=2, sort_keys=True)
              fh.write("\n")
          PY

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.1.1

      - name: Sign Provenance
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes \
            provenance.json \
            --output-signature provenance.json.sig \
            --output-certificate provenance.json.pem

      - name: Sign source archive
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes \
            source.tar.gz \
            --output-signature source.tar.gz.sig \
            --output-certificate source.tar.gz.pem

      - name: Upload provenance bundle
        uses: actions/upload-artifact@v4
        with:
          name: provenance-bundle
          path: |
            provenance.json
            provenance.json.sig
            provenance.json.pem
            source.tar.gz
            source.tar.gz.sha256
            source.tar.gz.sig
            source.tar.gz.pem
