name: Documentation Assets

on:
  workflow_dispatch:
  push:
    paths:
      - "src/verified/**/*.rs"
      - ".github/workflows/docs.yml"

jobs:
  generate-architecture-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install cargo-depgraph
        run: cargo install cargo-depgraph

      - name: Generate dependency graph PNG
        run: |
          cd src/verified
          cargo depgraph --all-deps | dot -Tpng > architecture_map.png

      - name: Upload architecture map
        uses: actions/upload-artifact@v4
        with:
          name: architecture-map
          path: src/verified/architecture_map.png
