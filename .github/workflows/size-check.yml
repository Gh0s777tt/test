name: ⚖️ Kernel Weight Watcher

on: [pull_request]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  bloat-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-bloat
        run: cargo install cargo-bloat

      - name: Analyze Binary Size
        run: |
          # Build and check what takes up space
          cargo bloat --release --crates -n 10 > bloat_report.txt
      
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('bloat_report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "### ⚖️ Binary Size Analysis\n```\n" + report + "\n```\n"
            })