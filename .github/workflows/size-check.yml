name: ⚖️ Kernel Weight Watcher

on: [pull_request]

jobs:
  bloat-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-bloat
        run: cargo install cargo-bloat

      - name: Analyze Binary Size
        run: |
          cargo bloat --release --lib --crates -n 20 > bloat_report.txt

      - name: Upload bloat report
        uses: actions/upload-artifact@v4
        with:
          name: bloat-report
          path: src/verified/bloat_report.txt
