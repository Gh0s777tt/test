name: ⚖️ Kernel Weight Watcher

on: [pull_request]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  bloat-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-bloat
        run: cargo install cargo-bloat || true
        continue-on-error: true

      - name: Analyze Binary Size
        run: |
          if command -v cargo-bloat &>/dev/null; then
            cargo bloat --release --crates -n 10 > bloat_report.txt || echo "Build failed, skipping bloat analysis" > bloat_report.txt
          else
            echo "cargo-bloat not available" > bloat_report.txt
          fi
        continue-on-error: true
      
      - name: Comment on PR
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('bloat_report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "### ⚖️ Binary Size Analysis\n```\n" + report + "\n```\n"
            })