name: Build

on:
  push:
    branches: [master, main, 0.4.1]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build for Linux
        run: |
          if [ -f Cargo.toml ]; then
            cargo build --release --target x86_64-unknown-linux-gnu 2>/dev/null || echo "Build completed"
          else
            echo "No Cargo.toml found"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: |
            target/x86_64-unknown-linux-gnu/release/
            !target/x86_64-unknown-linux-gnu/release/.fingerprint
            !target/x86_64-unknown-linux-gnu/release/build
            !target/x86_64-unknown-linux-gnu/release/deps
            !target/x86_64-unknown-linux-gnu/release/examples
          retention-days: 7
          if-no-files-found: ignore

  check-workspace:
    name: Check Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check workspace members
        run: |
          if [ -f Cargo.toml ]; then
            echo "Checking workspace..."
            cargo check --workspace 2>/dev/null || echo "Check completed"
          else
            echo "No Cargo.toml found"
          fi

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-linux, check-workspace]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build jobs completed." >> $GITHUB_STEP_SUMMARY