name: VantisOS CI/CD Pipeline

on:
  push:
    branches: [ main, 0.4.1, develop ]
  pull_request:
    branches: [ main, 0.4.1, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        components: rustfmt, clippy
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Format check
      run: cargo fmt -- --check
    
    - name: Clippy
      run: cargo clippy -- -D warnings
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Run tests
      run: cargo test --release --verbose
    
    - name: Generate coverage
      run: |
        cargo install cargo-tarpaulin
        cargo tarpaulin --out Xml --output-dir ./coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/cobertura.xml
        flags: unittests
        name: codecov-umbrella

  formal-verification:
    name: Formal Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Install Verus
      run: |
        curl -L https://github.com/verus-lang/verus/releases/latest/download/verus-x86_64-unknown-linux-gnu -o verus 2>/dev/null || true
        if [ -f verus ]; then
          chmod +x verus
          sudo mv verus /usr/local/bin/
        else
          echo "Verus binary not available for this platform, skipping"
        fi
      continue-on-error: true
    
    - name: Install Kani
      run: cargo install kani-verifier || true
      continue-on-error: true
    
    - name: Run Verus verification
      run: |
        if command -v verus &>/dev/null; then
          cd src/verified
          verus verify ipc.rs ipc_verified.rs
        else
          echo "Verus not available, skipping verification"
        fi
      continue-on-error: true
    
    - name: Run Kani verification
      run: |
        if command -v kani &>/dev/null; then
          cd src/verified
          kani ipc.rs --enable-unstable
        else
          echo "Kani not available, skipping verification"
        fi
      continue-on-error: true
    
    - name: Upload verification results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: verification-results
        path: |
          src/verified/*.vproof
          src/verified/*.kani-metadata.json
      continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Run cargo-audit
      run: |
        cargo install cargo-audit || true
        cargo audit || true

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Build release
      run: cargo build --release
      continue-on-error: true
    
    - name: Run benchmarks
      run: |
        if [ -d "src/verified" ] && [ -f "src/verified/Cargo.toml" ]; then
          cd src/verified
          cargo test --release -- --nocapture --test-threads=1 benchmark || true
        else
          echo "No verified benchmarks found, skipping"
        fi
      continue-on-error: true
    
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: benchmark-results
        path: |
          src/verified/benchmark-*.json
      continue-on-error: true

  documentation:
    name: Documentation Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        components: rust-docs
        override: true
    
    - name: Build documentation
      run: cargo doc --no-deps --all-features
    
    - name: Deploy documentation to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/0.4.1'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./target/doc
      continue-on-error: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, formal-verification, security-scan, performance-benchmarks]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Build release
      run: cargo build --release
    
    - name: Create release archive
      run: |
        tar -czf vantisos-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz \
          target/release/vantisos \
          target/release/*.so \
          README.md \
          LICENSE
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: vantisos-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}