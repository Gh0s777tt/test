name: Release Signing

on:
  release:
    types: [published]

jobs:
  sign-source-archive:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create source archive
        run: tar -czf vantis-source.tar.gz --exclude=".git" .

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.1.1

      - name: Sign source archive
        run: |
          cosign sign-blob --yes \
            vantis-source.tar.gz \
            --output-signature vantis-source.tar.gz.sig \
            --output-certificate vantis-source.tar.gz.pem
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-signature
          path: |
            vantis-source.tar.gz
            vantis-source.tar.gz.sig
            vantis-source.tar.gz.pem
