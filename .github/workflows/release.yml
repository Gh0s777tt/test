      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.1.1

      - name: Sign the ISO
        run: |
          cosign sign-blob --yes \
            --oidc-provider=github \
            vantis-core.iso \
            --output-signature vantis-core.iso.sig \
            --output-certificate vantis-core.iso.pem
        env:
          COSIGN_EXPERIMENTAL: 1
