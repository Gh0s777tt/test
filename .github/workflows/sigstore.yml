name: Sigstore Sign

on:
  push:
    branches: [ 0.4.1 ]

permissions:
  contents: read
  id-token: write

jobs:
  sign:
    runs-on: ubuntu-latest
    # Only run if there are actual binary artifacts to sign
    if: false  # Disabled until binary artifacts are available
    defaults:
      run:
        working-directory: src/verified
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Check for binary
        id: check-binary
        run: |
          if [ -f "target/release/vantis" ]; then
            echo "has_binary=true" >> $GITHUB_OUTPUT
          else
            echo "has_binary=false" >> $GITHUB_OUTPUT
          fi
      - name: Sign artifacts
        if: steps.check-binary.outputs.has_binary == 'true'
        uses: sigstore/fulcio-action@v1
        with:
          artifact: target/release/vantis
      - name: Upload signature
        if: steps.check-binary.outputs.has_binary == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: target/release/*.sig
          if-no-files-found: ignore