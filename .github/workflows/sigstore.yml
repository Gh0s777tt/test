name: Sigstore Sign

on:
  push:
    branches: [ 0.4.1 ]

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  sign:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verified
    steps:
      - uses: actions/checkout@v6
      - name: Sign artifacts
        uses: sigstore/fulcio-action@v1
        with:
          artifact: target/release
      - name: Upload signature
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: target/release/*.sig