name: 🐞 Bug Report
description: Create a report to help us improve Vantis OS.
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: Vantis OS Version
      description: Which version are you running? (e.g., v5.0.1-nightly)
      placeholder: v5.0.1
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (System Crash)
        - Major (Feature Broken)
        - Minor (Visual Glitch)
