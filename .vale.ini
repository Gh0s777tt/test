; Vale configuration for VantisOS documentation linting
; https://docs.errata.com/vale/introduction

StylesPath = .github/styles

; Minimum alert level (suggestion, warning, error)
MinAlertLevel = warning

; Global settings
[*.md]
BasedOnStyles = Vale, write-good

; Disable certain rules
Vale.Spelling = NO
write-good.Passive = NO

[docs/guides/*.md]
; Less strict for user guides
MinAlertLevel = suggestion

[docs/api/*.md]
; Strict for API documentation
MinAlertLevel = error

[*.adoc]
BasedOnStyles = Vale