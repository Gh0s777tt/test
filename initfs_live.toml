# This is the default configuration file

# General settings
[general]
# Do not prompt if settings are not defined
prompt = false

# Package settings
[packages]
base-initfs = {}
redoxfs = {}

[[files]]
path="/etc/pkg.d"
data=""
directory=true

[[files]]
path="/etc/pkg.d/50_redox"
data="https://static.redox-os.org/pkg"

[[files]]
path="/etc/init.rc"
data="""
export PATH /bin
export TMPDIR /tmp
vesad T T
stdio display:1
ps2d us
pcid /etc/pcid/initfs.toml
redoxfs disk/live: file
cd file:
export PATH file:/bin
run.d /etc/init.d
"""
