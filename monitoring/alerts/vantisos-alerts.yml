groups:
  - name: vantisos_alerts
    interval: 30s
    rules:
      # High CPU usage alert
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="vantisos"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "VantisOS CPU usage is above 80% for 5 minutes"

      # Critical CPU usage alert
      - alert: CriticalCPUUsage
        expr: rate(process_cpu_seconds_total{job="vantisos"}[5m]) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage detected"
          description: "VantisOS CPU usage is above 95% for 2 minutes"

      # High memory usage alert
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="vantisos"} / 1024 / 1024 / 1024 > 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "VantisOS memory usage is above 8GB for 5 minutes"

      # Critical memory usage alert
      - alert: CriticalMemoryUsage
        expr: process_resident_memory_bytes{job="vantisos"} / 1024 / 1024 / 1024 > 12
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage detected"
          description: "VantisOS memory usage is above 12GB for 2 minutes"

      # High IPC latency alert
      - alert: HighIPCLatency
        expr: histogram_quantile(0.99, rate(ipc_latency_seconds_bucket{job="vantisos"}[5m])) > 0.001
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High IPC latency detected"
          description: "99th percentile IPC latency is above 1ms for 5 minutes"

      # Critical IPC latency alert
      - alert: CriticalIPCLatency
        expr: histogram_quantile(0.99, rate(ipc_latency_seconds_bucket{job="vantisos"}[5m])) > 0.005
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical IPC latency detected"
          description: "99th percentile IPC latency is above 5ms for 2 minutes"

      # High error rate alert
      - alert: HighErrorRate
        expr: rate(vantisos_errors_total{job="vantisos"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "VantisOS error rate is above 10 errors/second for 5 minutes"

      # Critical error rate alert
      - alert: CriticalErrorRate
        expr: rate(vantisos_errors_total{job="vantisos"}[5m]) > 50
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate detected"
          description: "VantisOS error rate is above 50 errors/second for 2 minutes"

      # Service down alert
      - alert: ServiceDown
        expr: up{job="vantisos"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "VantisOS service is down"
          description: "VantisOS service has been down for 1 minute"

      # Disk space low alert
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"
          description: "Disk space is below 10% for 5 minutes"

      # Disk space critical alert
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critical"
          description: "Disk space is below 5% for 2 minutes"

      # Database connection pool exhausted
      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection pool usage is above 90% for 5 minutes"

      # Database connection pool critical
      - alert: DatabaseConnectionPoolCritical
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool critical"
          description: "Database connection pool usage is above 95% for 2 minutes"

      # Self-healing failures alert
      - alert: SelfHealingFailures
        expr: rate(self_healing_failures_total{job="vantisos"}[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Self-healing failures detected"
          description: "Self-healing failure rate is above 1 failure/second for 5 minutes"

      # Self-healing critical failures alert
      - alert: SelfHealingCriticalFailures
        expr: rate(self_healing_failures_total{job="vantisos"}[5m]) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical self-healing failures detected"
          description: "Self-healing failure rate is above 5 failures/second for 2 minutes"