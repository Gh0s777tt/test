version: '3.8'

services:
  # Development environment
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
      args:
        USERNAME: vantis
        USER_UID: 1000
        USER_GID: 1000
    image: vantisos-dev:latest
    container_name: vantisos-dev
    
    # Volume mounts
    volumes:
      # Mount source code
      - ..:/workspace:cached
      # Cargo cache for faster builds
      - cargo-cache:/usr/local/cargo
      # Git credentials
      - ~/.gitconfig:/home/vantis/.gitconfig:ro
      - ~/.ssh:/home/vantis/.ssh:ro
      # VS Code server
      - vscode-extensions:/home/vantis/.vscode-server/extensions
      # Build cache
      - target-cache:/workspace/target
    
    # Environment variables
    environment:
      - RUST_BACKTRACE=1
      - RUST_LOG=info
      - CARGO_INCREMENTAL=1
      - CARGO_NET_GIT_FETCH_WITH_CLI=true
      - CARGO_BUILD_JOBS=4
      - TERM=xterm-256color
    
    # Working directory
    working_dir: /workspace
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Network
    networks:
      - vantisos-network
    
    # Port mappings
    ports:
      - "8080:8080"  # Development server
      - "8081:8081"  # Documentation server
      - "8082:8082"  # Metrics dashboard
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Capabilities for QEMU
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/kvm:/dev/kvm
    privileged: false

  # Database (if needed for testing)
  postgres:
    image: postgres:15-alpine
    container_name: vantisos-postgres
    environment:
      POSTGRES_USER: vantis
      POSTGRES_PASSWORD: vantis
      POSTGRES_DB: vantisos_test
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vantisos-network
    ports:
      - "5432:5432"
    profiles:
      - postgres

  # Redis (if needed for caching)
  redis:
    image: redis:7-alpine
    container_name: vantisos-redis
    volumes:
      - redis-data:/data
    networks:
      - vantisos-network
    ports:
      - "6379:6379"
    profiles:
      - redis

  # Documentation server
  docs:
    image: vantisos-dev:latest
    container_name: vantisos-docs
    working_dir: /workspace/docs
    command: python3 -m http.server 8081
    volumes:
      - ..:/workspace:cached
    networks:
      - vantisos-network
    ports:
      - "8081:8081"
    profiles:
      - docs

  # Metrics dashboard
  metrics:
    image: prom/prometheus:latest
    container_name: vantisos-metrics
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - vantisos-network
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    profiles:
      - metrics

# Volumes
volumes:
  cargo-cache:
    driver: local
  vscode-extensions:
    driver: local
  target-cache:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local

# Networks
networks:
  vantisos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16