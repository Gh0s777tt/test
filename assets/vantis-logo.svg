<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39FF14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39FF14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#000000" stroke="#39FF14" stroke-width="2" filter="url(#glow)"/>
  
  <!-- VANTIS text -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#39FF14">
    VANTIS
  </text>
  
  <!-- OS text -->
  <text x="100" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">
    OS
  </text>
  
  <!-- Security shield icon -->
  <path d="M100 130 L85 145 L100 160 L115 145 Z" fill="#39FF14" opacity="0.8"/>
  
  <!-- Microkernel dots -->
  <circle cx="75" cy="75" r="5" fill="#39FF14"/>
  <circle cx="125" cy="75" r="5" fill="#39FF14"/>
  <circle cx="75" cy="125" r="5" fill="#39FF14"/>
  <circle cx="125" cy="125" r="5" fill="#39FF14"/>
</svg>