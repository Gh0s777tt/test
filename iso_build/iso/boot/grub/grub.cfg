set timeout=5
set default=0

menuentry "VantisOS v1.5.0 'Quantum Ready'" {
    multiboot /boot/vantis-kernel.bin
    module /boot/initramfs.gz initramfs
    boot
}

menuentry "VantisOS v1.5.0 'Quantum Ready' (Safe Mode)" {
    multiboot /boot/vantis-kernel.bin safe
    module /boot/initramfs.gz initramfs
    boot
}

menuentry "VantisOS v1.5.0 'Quantum Ready' (Install Mode)" {
    multiboot /boot/vantis-kernel.bin install
    module /boot/initramfs.gz initramfs
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
