# VANTIS OS - GITLAB FALLBACK PROTOCOL
image: rust:latest

stages:
  - check
  - test

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

cache:
  paths:
    - .cargo/
    - target/

# 1. Sprawdzenie sformatowania kodu
rust_fmt:
  stage: check
  script:
    - rustup component add rustfmt
    - cargo fmt -- --check

# 2. Uruchomienie testów (To samo co na GitHubie)
unit_tests:
  stage: test
  script:
    - cargo test --verbose
