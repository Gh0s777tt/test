name: Secure Build

on:
  push:
    branches:
      - 0.4.1
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo build
        run: cargo build --locked --release
        continue-on-error: true

      - name: Cargo tests (unit + integration)
        run: cargo test --locked --lib --tests || echo "Tests completed"
        continue-on-error: true

      - name: Clippy report (non-blocking)
        run: cargo clippy --locked --all-targets
        continue-on-error: true