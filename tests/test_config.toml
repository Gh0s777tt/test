# Advanced Testing Configuration for VantisOS
# Comprehensive testing framework setup and configuration

[general]
# Project testing settings
project_name = "VantisOS"
version = "0.4.1"
test_timeout = "300s"
parallel_tests = true
test_threads = 4

[coverage]
# Code coverage requirements
minimum_line_coverage = 70.0
minimum_branch_coverage = 60.0
minimum_function_coverage = 75.0
fail_on_low_coverage = true

[property_based]
# Property-based testing with proptest
enabled = true
max_test_cases = 100
max_local_runs = 1000
timeout = "10s"

[fuzzing]
# Fuzz testing configuration
enabled = true
max_duration = "300s"
max_input_size = 4096
timeout = "5s"

[integration]
# Integration test settings
test_suite = "integration"
setup_timeout = "60s"
teardown_timeout = "30s"
cleanup_on_failure = true

[benchmarking]
# Performance benchmarking
enabled = true
baseline_commit = "main"
threshold_percent = 10.0
warmup_iterations = 3
measurement_iterations = 10

[quality_gates]
# Quality gate thresholds
max_complexity = 15
max_function_lines = 100
max_cyclomatic_complexity = 20
max_cognitive_complexity = 15

[reporting]
# Test reporting configuration
output_formats = ["html", "json", "junit"]
output_directory = "test-results"
include_passing_tests = true
include_skipped_tests = true
detailed_output = true

[ci_integration]
# CI/CD integration settings
upload_coverage = true
upload_reports = true
create_badges = true
notify_on_failure = true

[logging]
# Logging configuration
level = "info"
format = "pretty"
show_stdout = false
show_stderr = true